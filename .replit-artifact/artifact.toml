kind = "mobile"
previewPath = "/devmood/"
title = "DevMood"
version = "1.0.0"
id = "artifacts/devmood"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/devmood/" ]
localPort = 20575

[services.development]
run = "pnpm --filter @workspace/devmood run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/devmood", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/devmood", "run", "serve" ]

[services.env]
PORT = "20575"
BASE_PATH = "/devmood/"
